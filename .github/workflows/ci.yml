name: Simple Transaction CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  laravel:
    name: Laravel Backend and Blade Assets
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend-laravel

    env:
      APP_ENV: testing
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, dom, fileinfo, mbstring, openssl, pdo_sqlite, sqlite3, tokenizer, xml
          coverage: none

      - name: Validate Composer manifest
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run backend tests
        run: composer test

      - name: Run PHPStan analysis
        run: composer analyse

      - name: Run PHP_CodeSniffer
        run: composer lint

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend-laravel/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build Blade/Vite assets
        run: npm run build
